site_name: Scholaro Developer Docs
site_description: Developer documentation for Scholaro GPA report integrations
site_url: https://docs.scholaro.com
repo_url: https://github.com/alex-scholaro/scholaro-dev-docs
repo_name: Scholaro Docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Developer Docs:
      - Getting Started: developer/getting-started.md
      - GPA Report Integration Guide: developer/gpa-report-integration-guide.md
      - Webhooks:
          - Section Home: developer/webhooks.md
          - Overview: developer/webhooks/overview.md
          - Events Reference: developer/webhooks/events-reference.md
          - PDF Delivery Events: developer/webhooks/pdf-delivery-events.md
          - TargetX / Salesforce File Delivery: developer/webhooks/targetx-salesforce-file-delivery.md
      - Integrations:
          - Slate Integration Setup: developer/integrations/slate-integration-setup.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  social: []
